name: TG Watermark Worker

# ──────────────────────────────────────────────────────────────────────────────
# Triggers:
#   1. Manual run (workflow_dispatch) — Run बटण दाबल्यावर
#   2. Schedule — दर 5 तासांनी auto restart (GitHub Actions max 6hr/run)
# ──────────────────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:        # Manual trigger from GitHub Actions tab
  schedule:
    - cron: '0 */5 * * *'  # Auto-restart every 5 hours

jobs:
  watermark-worker:
    name: 🎬 Watermark Worker
    runs-on: ubuntu-latest  # ← Free GitHub runner (CPU only)
    # runs-on: ubuntu-latest-gpu   # ← Uncomment if you use a GPU runner (paid)

    timeout-minutes: 350    # GitHub max is 360min; 350 = safe margin

    steps:
      # ── 1. Checkout code ────────────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ─────────────────────────────────────────────────────
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. System packages (ffmpeg + fonts) ─────────────────────────────────
      - name: 📦 Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-dejavu \
            fontconfig \
            wget
          fc-cache -f -v
          ffmpeg -version | head -3
          echo "✅ FFmpeg ready"

      # ── 4. Python packages ───────────────────────────────────────────────────
      - name: 📦 Install Python dependencies
        run: pip install -r requirements.txt

      # ── 5. Run worker ────────────────────────────────────────────────────────
      - name: 🚀 Run Watermark Worker
        env:
          KOYEB_URL:     ${{ secrets.KOYEB_URL }}
          COLAB_SECRET:  ${{ secrets.COLAB_SECRET }}
          POLL_INTERVAL: ${{ vars.POLL_INTERVAL || '5' }}
        run: python worker/watermark_worker.py
